{% extends "base.html" %}
{% block title %}Your Rights{% endblock %}
{% block content %}
<h1>Your Workplace Rights</h1>
<p class="text-muted">Understand your protections under workplace fairness laws.</p>

<div class="card-grid">
    {% for cat in categories %}
    <a href="/rights/{{ cat.id }}" class="card" style="text-decoration: none; color: inherit;">
        <h3>{{ cat.title }}</h3>
        <p>{{ cat.summary }}</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
